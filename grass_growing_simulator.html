<style>
  @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'VT323', monospace; cursor: crosshair; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;

    border-radius: 8px;
    padding: 12px 18px;
    color: #fff;
    font-size: 18px;
    line-height: 1.6;

    pointer-events: auto;
  }

  .hud-panel .label { color: rgba(255,255,255,0.5); font-size: 14px; }
  .hud-panel .value { color: #7fff7f; font-family: 'Silkscreen', monospace; font-size: 20px; }
  .hud-panel .value.rain { color: #7fafff; }
  .hud-panel .value.time { color: #ffdf7f; }

  #title-screen {
    position: fixed; inset: 0; z-index: 100;

  }
  #title-screen .sub {
    font-family: 'VT323', monospace;

    color: rgba(255,255,255,0.7);

    text-align: center;
  }
  #title-screen .sub em { color: #ffd700; font-style: normal; }

  #start-btn {
    font-family: 'Silkscreen', monospace;
    font-size: 24px;
    padding: 16px 48px;
    background: linear-gradient(180deg, #5c5 0%, #3a3 100%);
    color: #fff;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 12px;

    text-shadow: 0 2px 4px rgba(0,0,0,0.3);

  }
  #start-btn:hover { transform: scale(1.08); box-shadow: 0 8px 40px rgba(0,150,0,0.5); }

  @keyframes titleBob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  #achievement {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(120px);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 2px solid #ffd700;
    border-radius: 12px;
    padding: 14px 28px;
    color: #ffd700;
    font-family: 'Silkscreen', monospace;
    font-size: 18px;
    z-index: 50;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }
  #achievement.show { transform: translateX(-50%) translateY(0); }

  #controls-hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 14px; z-index: 10;
    pointer-events: none;
  }

  #weather-btn {
    position: fixed; bottom: 16px; right: 24px;
    font-family: 'Silkscreen', monospace;
    font-size: 14px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    z-index: 10;
  }
  #weather-btn:hover { background: rgba(255,255,255,0.15); }

  #speed-ctrl {
    position: fixed; bottom: 16px; left: 24px;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  #speed-ctrl label { color: rgba(255,255,255,0.4); font-size: 14px; }
  #speed-ctrl button {
    font-family: 'Silkscreen', monospace; font-size: 13px;
    padding: 6px 12px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; color: #fff; cursor: pointer;
  }
  #speed-ctrl button.active { border-color: #7fff7f; color: #7fff7f; }
</style>
</head>
<body>

<div id="title-screen">
  <h1>🌱 GRASS GROWING<br>SIMULATOR 2026</h1>
  <div class="sub"><em>GOTY Edition</em> — Featuring Ultra-Realistic Blade Physics™</div>
  <button id="start-btn">▶ TOUCH GRASS</button>
</div>

<div id="hud" style="display:none">
  <div class="hud-panel" id="stats-panel">
    <div><span class="label">BLADES GROWN:</span> <span class="value" id="blade-count">0</span></div>
    <div><span class="label">AVG HEIGHT:</span> <span class="value" id="avg-height">0.0 cm</span></div>

<button id="weather-btn" style="display:none">🌧️ TOGGLE RAIN</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script>
// ============================================================
//  🌱 GRASS GROWING SIMULATOR 2026 — GOTY EDITION
//  "The game nobody asked for, but everyone deserves"
// ============================================================

// --- GLOBALS ---
let scene, camera, renderer, clock, composer;
let grassMesh, terrainMesh, sunLight, moonLight, ambientLight;
let sunSphere, moonSphere, skyDome;
let cloudPlanes = [];
let rainSystem = null, rainActive = false;
let gameTime = 0.25; // start at 6 AM (fraction of day, 0-1)
let timeSpeed = 1;
let grassBlades = [];
let totalGrassScore = 0;
let grassGrowthRate = 0.0;
let windStrength = 0.3;
let windDirection = 0;
let achievements = [];
let achievementQueue = [];
let achievementShowing = false;

// Camera
let camTarget = new THREE.Vector3(0, 8, 0);
let camAngleH = 0, camAngleV = 0.4;
let camDist = 35;
let keys = {};

const FIELD_SIZE = 350;
const GRASS_COUNT = 200000;
const TERRAIN_SEG = 192;

// --- SIMPLE NOISE ---
function hash(x, y) {
  let n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return n - Math.floor(n);
}
function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const a = hash(ix, iy), b = hash(ix+1, iy);
  const c = hash(ix, iy+1), d = hash(ix+1, iy+1);
  return a + (b-a)*sx + (c-a)*sy + (a-b-c+d)*sx*sy;
}
function fbm(x, y, octaves=5) {
  let v = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    v += amp * smoothNoise(x * freq, y * freq);
    amp *= 0.5; freq *= 2;
  }
  return v;
}

function getTerrainHeight(x, z) {
  // Rolling hills like Win XP Bliss
  let h = fbm(x * 0.008 + 5.3, z * 0.008 + 2.7, 5) * 18;
  h += fbm(x * 0.025, z * 0.025, 3) * 4;
  h += Math.sin(x * 0.01) * Math.cos(z * 0.015) * 6;
  return h;
}

// --- INIT ---
function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x88bbee, 0.0018);
  clock = new THREE.Clock();

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 2000);
  camera.position.set(0, 20, 35);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  // Post-processing: bloom
  composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  const bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.35,  // strength
    0.6,   // radius
    0.85   // threshold
  );
  composer.addPass(bloomPass);

  createSky();
  createLights();
  createTerrain();
  createGrass();
  createClouds();
  createRain();
  setupControls();
  animate();
}

// --- SKY DOME ---
function createSky() {
  const geo = new THREE.SphereGeometry(900, 32, 32);
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      uSunPos: { value: new THREE.Vector3(0, 1, 0) },
      uTime: { value: 0 },
      uRain: { value: 0 }
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uSunPos;
      uniform float uTime;
      uniform float uRain;
      varying vec3 vWorldPos;
      void main() {
        vec3 dir = normalize(vWorldPos);
        float y = dir.y * 0.5 + 0.5;
        float sunH = uSunPos.y;

        // Day colors
        vec3 dayTop = vec3(0.25, 0.55, 0.95);
        vec3 dayBot = vec3(0.6, 0.8, 1.0);
        vec3 dayCol = mix(dayBot, dayTop, pow(y, 0.8));

        // Sunset colors
        vec3 sunsetTop = vec3(0.15, 0.1, 0.35);
        vec3 sunsetBot = vec3(0.9, 0.4, 0.15);
        vec3 sunsetCol = mix(sunsetBot, sunsetTop, pow(y, 0.5));

        // Night colors
        vec3 nightTop = vec3(0.02, 0.02, 0.08);
        vec3 nightBot = vec3(0.05, 0.05, 0.15);
        vec3 nightCol = mix(nightBot, nightTop, pow(y, 0.6));

        // Blend
        float dayF = smoothstep(-0.1, 0.3, sunH);
        float sunsetF = smoothstep(-0.2, 0.0, sunH) * (1.0 - smoothstep(0.0, 0.25, sunH));

        vec3 col = mix(nightCol, dayCol, dayF);
        col = mix(col, sunsetCol, sunsetF * 0.7);

        // Sun glow
        float sunDot = max(dot(dir, normalize(uSunPos)), 0.0);
        col += vec3(1.0, 0.8, 0.4) * pow(sunDot, 64.0) * 2.0 * max(sunH, 0.0);
        col += vec3(1.0, 0.6, 0.3) * pow(sunDot, 8.0) * 0.3 * max(sunH + 0.1, 0.0);

        // Rain overcast
        vec3 overcast = vec3(0.45, 0.48, 0.52);
        col = mix(col, overcast, uRain * 0.7);

        // Stars at night
        float starHash = fract(sin(dot(floor(dir * 500.0), vec3(127.1, 311.7, 74.7))) * 43758.5453);
        float star = step(0.998, starHash) * (1.0 - dayF) * (1.0 - uRain);
        col += vec3(star) * 0.8;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  skyDome = new THREE.Mesh(geo, mat);
  scene.add(skyDome);

  // Sun sphere
  const sunGeo = new THREE.SphereGeometry(16, 16, 16);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffee88 });
  sunSphere = new THREE.Mesh(sunGeo, sunMat);
  scene.add(sunSphere);

  // Moon sphere
  const moonGeo = new THREE.SphereGeometry(10, 16, 16);
  const moonMat = new THREE.MeshBasicMaterial({ color: 0xddeeff });
  moonSphere = new THREE.Mesh(moonGeo, moonMat);
  scene.add(moonSphere);
}

// --- LIGHTS ---
function createLights() {
  ambientLight = new THREE.AmbientLight(0x404060, 0.3);
  scene.add(ambientLight);

  sunLight = new THREE.DirectionalLight(0xffeedd, 1.0);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  sunLight.shadow.camera.left = -80;
  sunLight.shadow.camera.right = 80;
  sunLight.shadow.camera.top = 80;
  sunLight.shadow.camera.bottom = -80;
  sunLight.shadow.camera.far = 300;
  scene.add(sunLight);

  moonLight = new THREE.DirectionalLight(0x8899cc, 0.15);
  scene.add(moonLight);
}

// --- TERRAIN ---
function createTerrain() {
  const geo = new THREE.PlaneGeometry(FIELD_SIZE * 2.5, FIELD_SIZE * 2.5, TERRAIN_SEG, TERRAIN_SEG);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    pos.setY(i, getTerrainHeight(x, z));
  }
  geo.computeVertexNormals();

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uSunDir: { value: new THREE.Vector3(0,1,0) },
      uMoonDir: { value: new THREE.Vector3(0,-1,0) },
      uDayFactor: { value: 1.0 }
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      varying float vHeight;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        vHeight = position.y;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uSunDir;
      uniform vec3 uMoonDir;
      uniform float uDayFactor;
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      varying float vHeight;
      void main() {
        float h = vHeight;
        // Grass colors with height variation
        vec3 grass1 = vec3(0.22, 0.55, 0.12);
        vec3 grass2 = vec3(0.35, 0.65, 0.15);
        vec3 grass3 = vec3(0.18, 0.45, 0.08);
        float n = fract(sin(dot(vWorldPos.xz * 0.05, vec2(127.1, 311.7))) * 43758.5453);
        vec3 baseCol = mix(mix(grass1, grass2, n), grass3, smoothstep(5.0, 15.0, h));

        // Sun lighting
        float sunDiff = max(dot(vNormal, normalize(uSunDir)), 0.0);
        vec3 sunCol = vec3(1.0, 0.95, 0.85) * sunDiff * 0.7 * uDayFactor;

        // Moon lighting — cool blue tint
        float moonDiff = max(dot(vNormal, normalize(uMoonDir)), 0.0);
        vec3 moonCol = vec3(0.2, 0.25, 0.45) * moonDiff * 0.35 * (1.0 - uDayFactor);

        // Ambient
        float ambient = 0.15 + uDayFactor * 0.25;
        vec3 ambCol = mix(vec3(0.05, 0.06, 0.12), vec3(0.3, 0.3, 0.25), uDayFactor) * ambient;

        vec3 lit = baseCol * (sunCol + moonCol + ambCol);
        gl_FragColor = vec4(lit, 1.0);
      }
    `
  });

  terrainMesh = new THREE.Mesh(geo, mat);
  terrainMesh.receiveShadow = true;
  scene.add(terrainMesh);
}

// --- GRASS ---
function createGrass() {
  // Grass blade geometry — a tapered quad
  const bladeGeo = new THREE.BufferGeometry();
  const verts = new Float32Array([
    -0.06, 0, 0,  0.06, 0, 0,  0.04, 0.5, 0,
    -0.06, 0, 0,  0.04, 0.5, 0, -0.04, 0.5, 0,
    -0.04, 0.5, 0, 0.04, 0.5, 0, 0.0, 1.0, 0,
  ]);
  const uvs = new Float32Array([
    0,0, 1,0, 1,0.5,
    0,0, 1,0.5, 0,0.5,
    0,0.5, 1,0.5, 0.5,1.0,
  ]);
  bladeGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  bladeGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

  const mat = new THREE.ShaderMaterial({
    side: THREE.DoubleSide,
    uniforms: {
      uTime: { value: 0 },
      uWindStr: { value: 0.3 },
      uWindDir: { value: new THREE.Vector2(1, 0.5) },
      uSunDir: { value: new THREE.Vector3(0, 1, 0) },
      uDayFactor: { value: 1.0 },
      uGrowth: { value: 0.0 }
    },
    vertexShader: `
      uniform float uTime;
      uniform float uWindStr;
      uniform vec2 uWindDir;
      uniform float uGrowth;

      varying float vY;
      varying vec3 vWorldPos;

      void main() {
        vec4 mvPos = instanceMatrix * vec4(position, 1.0);
        vWorldPos = (modelMatrix * mvPos).xyz;

        // Wind displacement increases with blade height
        float windPhase = dot(vWorldPos.xz, normalize(uWindDir) * 0.15) + uTime * 2.5;
        float windWave = sin(windPhase) * 0.5 + sin(windPhase * 2.3 + 1.5) * 0.25 + sin(windPhase * 0.7 + 3.0) * 0.25;
        float heightFactor = position.y; // 0 at base, 1 at tip

        mvPos.x += windWave * uWindStr * heightFactor * 1.8;
        mvPos.z += windWave * uWindStr * heightFactor * 0.6 * sin(uTime * 0.5 + vWorldPos.x);

        vY = position.y;
        gl_Position = projectionMatrix * modelViewMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform vec3 uSunDir;
      uniform float uDayFactor;
      varying float vY;
      varying vec3 vWorldPos;

      void main() {
        // Color gradient from dark base to bright tip
        vec3 baseCol = vec3(0.1, 0.3, 0.05);
        vec3 tipCol = vec3(0.4, 0.75, 0.15);
        vec3 col = mix(baseCol, tipCol, vY);

        // Variation
        float n = fract(sin(dot(floor(vWorldPos.xz * 2.0), vec2(127.1, 311.7))) * 43758.5);
        col *= 0.85 + n * 0.3;

        // Sunlight contribution
        float sunFactor = max(uSunDir.y, 0.0) * 0.6 + 0.15;
        vec3 sunLit = col * sunFactor * vec3(1.0, 0.97, 0.9);

        // Moonlight contribution — cool desaturated blue
        float moonFactor = max(-uSunDir.y, 0.0) * 0.25;
        vec3 moonLit = col * moonFactor * vec3(0.4, 0.5, 0.8);

        // Ambient base so it's never pure black
        vec3 ambLit = col * mix(0.06, 0.2, uDayFactor);

        vec3 finalCol = sunLit * uDayFactor + moonLit * (1.0 - uDayFactor) + ambLit;
        gl_FragColor = vec4(finalCol, 1.0);
      }
    `
  });

  grassMesh = new THREE.InstancedMesh(bladeGeo, mat, GRASS_COUNT);
  grassMesh.castShadow = true;

  const dummy = new THREE.Object3D();
  grassBlades = [];

  // LOD density: more grass closer to center (camera start), sparser further out
  for (let i = 0; i < GRASS_COUNT; i++) {
    // Weighted distribution — 55% within inner ring, 30% mid, 15% outer
    let r, angle;
    const roll = Math.random();
    angle = Math.random() * Math.PI * 2;
    if (roll < 0.55) {
      r = Math.random() * FIELD_SIZE * 0.4; // inner dense zone
    } else if (roll < 0.85) {
      r = FIELD_SIZE * 0.4 + Math.random() * FIELD_SIZE * 0.4; // mid zone
    } else {
      r = FIELD_SIZE * 0.8 + Math.random() * FIELD_SIZE * 0.4; // outer sparse zone
    }
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    const y = getTerrainHeight(x, z);
    const rot = Math.random() * Math.PI * 2;
    const baseScale = 0.3 + Math.random() * 0.4;
    const maxScale = 2.0 + Math.random() * 4.0;
    const growSpeed = 0.005 + Math.random() * 0.02;

    grassBlades.push({ x, y, z, rot, scale: baseScale, maxScale, growSpeed, grown: false });

    dummy.position.set(x, y, z);
    dummy.rotation.set(0, rot, 0);
    dummy.scale.set(1, baseScale, 1);
    dummy.updateMatrix();
    grassMesh.setMatrixAt(i, dummy.matrix);
  }
  grassMesh.instanceMatrix.needsUpdate = true;
  scene.add(grassMesh);
}

// --- PROCEDURAL CLOUDS (2D noise planes) ---
function createClouds() {
  const cloudVertShader = `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;
  const cloudFragShader = `
    uniform float uTime;
    uniform float uRain;
    uniform float uSeed;
    uniform float uDayFactor;
    varying vec2 vUv;

    // Hash and noise functions for procedural clouds
    float hash2D(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }
    float noise2D(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash2D(i);
      float b = hash2D(i + vec2(1.0, 0.0));
      float c = hash2D(i + vec2(0.0, 1.0));
      float d = hash2D(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }
    float fbmCloud(vec2 p) {
      float v = 0.0, amp = 0.5, freq = 1.0;
      for (int i = 0; i < 6; i++) {
        v += amp * noise2D(p * freq);
        amp *= 0.5;
        freq *= 2.0;
      }
      return v;
    }

    void main() {
      vec2 uv = vUv;
      // Scroll with time for movement
      vec2 p = uv * 3.0 + vec2(uTime * 0.02, uTime * 0.005) + uSeed * 10.0;

      // Layer 1: large cloud shapes
      float n1 = fbmCloud(p * 1.0);
      // Layer 2: medium detail
      float n2 = fbmCloud(p * 2.5 + vec2(5.3, 1.7));
      // Layer 3: fine wispy detail
      float n3 = fbmCloud(p * 6.0 + vec2(9.1, 4.3));

      // Combine layers — large shapes define coverage, details add texture
      float cloud = n1 * 0.6 + n2 * 0.3 + n3 * 0.1;

      // Shape the cloud: threshold and soften edges
      float coverage = mix(0.42, 0.32, uRain); // more coverage in rain
      cloud = smoothstep(coverage, coverage + 0.25, cloud);

      // Edge fade to avoid hard plane edges
      float edgeFade = smoothstep(0.0, 0.15, uv.x) * smoothstep(1.0, 0.85, uv.x)
                     * smoothstep(0.0, 0.15, uv.y) * smoothstep(1.0, 0.85, uv.y);
      cloud *= edgeFade;

      // Cloud color: white in day, grey in rain, dark blue tint at night
      vec3 dayCloud = vec3(1.0, 0.99, 0.96);
      vec3 rainCloud = vec3(0.5, 0.52, 0.55);
      vec3 nightCloud = vec3(0.12, 0.14, 0.22);
      vec3 col = mix(nightCloud, dayCloud, uDayFactor);
      col = mix(col, rainCloud, uRain * 0.8);

      // Slight luminous edge highlight for bloom
      col += vec3(0.15, 0.12, 0.08) * pow(cloud, 3.0) * uDayFactor;

      float alpha = cloud * mix(0.7, 0.9, uRain);
      gl_FragColor = vec4(col, alpha);
    }
  `;

  // Create several large cloud planes at different altitudes
  for (let i = 0; i < 18; i++) {
    const size = 120 + Math.random() * 200;
    const geo = new THREE.PlaneGeometry(size, size * (0.5 + Math.random() * 0.4));
    const mat = new THREE.ShaderMaterial({
      vertexShader: cloudVertShader,
      fragmentShader: cloudFragShader,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
      uniforms: {
        uTime: { value: 0 },
        uRain: { value: 0 },
        uSeed: { value: Math.random() * 100 },
        uDayFactor: { value: 1.0 }
      }
    });

    const plane = new THREE.Mesh(geo, mat);
    plane.rotation.x = -Math.PI / 2; // horizontal
    plane.rotation.z = Math.random() * Math.PI * 2; // random yaw
    plane.position.set(
      (Math.random() - 0.5) * 800,
      60 + Math.random() * 50,
      (Math.random() - 0.5) * 800
    );
    plane.userData = {
      speed: 1.0 + Math.random() * 3.0,
      baseY: plane.position.y
    };
    scene.add(plane);
    cloudPlanes.push(plane);
  }
}

// --- RAIN ---
function createRain() {
  const count = 8000;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    positions[i*3] = (Math.random() - 0.5) * 300;
    positions[i*3+1] = Math.random() * 120;
    positions[i*3+2] = (Math.random() - 0.5) * 300;
    velocities[i] = 30 + Math.random() * 20;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const mat = new THREE.PointsMaterial({
    color: 0xaaccff,
    size: 0.3,
    transparent: true,
    opacity: 0,
    depthWrite: false
  });

  rainSystem = new THREE.Points(geo, mat);
  rainSystem.userData.velocities = velocities;
  scene.add(rainSystem);
}

// --- CONTROLS ---
function setupControls() {
  document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  let dragging = false, lastX = 0, lastY = 0;
  renderer.domElement.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
  document.addEventListener('mouseup', () => dragging = false);
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    camAngleH -= (e.clientX - lastX) * 0.005;
    camAngleV = Math.max(-0.1, Math.min(1.2, camAngleV + (e.clientY - lastY) * 0.005));
    lastX = e.clientX; lastY = e.clientY;
  });
  renderer.domElement.addEventListener('wheel', e => {
    camDist = Math.max(8, Math.min(150, camDist + e.deltaY * 0.05));
  });

  // Touch
  renderer.domElement.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  });
  renderer.domElement.addEventListener('touchmove', e => {
    if (!dragging || e.touches.length !== 1) return;
    camAngleH -= (e.touches[0].clientX - lastX) * 0.005;
    camAngleV = Math.max(-0.1, Math.min(1.2, camAngleV + (e.touches[0].clientY - lastY) * 0.005));
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  });
  renderer.domElement.addEventListener('touchend', () => dragging = false);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (composer) composer.setSize(window.innerWidth, window.innerHeight);
  });

  // UI
  document.getElementById('weather-btn').addEventListener('click', () => {
    rainActive = !rainActive;
  });

  document.querySelectorAll('#speed-ctrl button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#speed-ctrl button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      timeSpeed = parseFloat(btn.dataset.speed);
    });
  });
}

// --- ACHIEVEMENTS ---
const ACHIEVEMENTS = [
  { id: 'start', condition: () => true, text: '🌱 FIRST BLADE — You touched grass!' },
  { id: 'min1', condition: (t) => t > 60, text: '⏰ ONE MINUTE — You watched grass for 60 seconds...' },
  { id: 'min5', condition: (t) => t > 300, text: '🧘 ZEN MASTER — 5 minutes of grass watching' },
  { id: 'min10', condition: (t) => t > 600, text: '🏆 GRASS CONNOISSEUR — 10 minutes!? Go outside.' },
  { id: 'blades1k', condition: (t, b) => b > 1000, text: '🌿 LAWN STARTER — 1,000 blades fully grown' },
  { id: 'blades10k', condition: (t, b) => b > 10000, text: '🏡 SUBURBIA — 10,000 blades! HOA approved.' },
  { id: 'blades50k', condition: (t, b) => b > 50000, text: '🌍 BLISS — You recreated Windows XP.' },
  { id: 'rain', condition: () => rainActive, text: '🌧️ PRECIPITATION — It\'s raining. The grass is thriving.' },
  { id: 'night', condition: (t, b, gt) => gt > 0.75 || gt < 0.15, text: '🌙 NIGHT OWL — Watching grass grow in the dark?' },
  { id: 'score1k', condition: (t, b, gt, s) => s > 1000, text: '📈 GRASS STONKS — Score over 1,000!' },
  { id: 'score10k', condition: (t, b, gt, s) => s > 10000, text: '💎 GRASS DIAMOND — Score over 10,000!' },
  { id: 'fast', condition: () => timeSpeed >= 10, text: '⚡ SPEED GROWING — 10x? That\'s cheating.' },
];

function checkAchievements(elapsedReal, grownCount) {
  ACHIEVEMENTS.forEach(a => {
    if (achievements.includes(a.id)) return;
    if (a.condition(elapsedReal, grownCount, gameTime, totalGrassScore)) {
      achievements.push(a.id);
      achievementQueue.push(a.text);
    }
  });
}

function showNextAchievement() {
  if (achievementShowing || achievementQueue.length === 0) return;
  achievementShowing = true;
  const el = document.getElementById('achievement');
  el.textContent = achievementQueue.shift();
  el.classList.add('show');
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => { achievementShowing = false; showNextAchievement(); }, 600);
  }, 3000);
}

// --- UPDATE LOOP ---
let realTime = 0;
const dummy = new THREE.Object3D();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  realTime += dt;

  // Game time (full day = 120 real seconds at 1x)
  gameTime += (dt * timeSpeed) / 120;
  gameTime = gameTime % 1;

  // Sun position
  const sunAngle = gameTime * Math.PI * 2 - Math.PI / 2;
  const sunX = Math.cos(sunAngle) * 200;
  const sunY = Math.sin(sunAngle) * 200;
  const sunDir = new THREE.Vector3(sunX, sunY, 50).normalize();

  sunSphere.position.copy(sunDir).multiplyScalar(800);
  sunSphere.visible = sunY > -20;
  moonSphere.position.copy(sunDir).multiplyScalar(-800);
  moonSphere.visible = sunY < 20;

  // Lighting
  const dayFactor = Math.max(0, Math.min(1, (sunDir.y + 0.1) / 0.4));

  // Sun light — warm and strong during day
  sunLight.position.copy(sunDir).multiplyScalar(100);
  sunLight.intensity = dayFactor * 1.8;
  const sunHue = 0.1 + (1 - dayFactor) * 0.02; // slightly more orange near horizon
  sunLight.color.setHSL(sunHue, 0.5, 0.6 + dayFactor * 0.4);

  // Moon light — cool blue, tracks opposite sun, stronger at night
  const moonDir = sunDir.clone().negate();
  moonLight.position.copy(moonDir).multiplyScalar(100);
  moonLight.intensity = (1 - dayFactor) * 0.4;
  moonLight.color.setHSL(0.6, 0.35, 0.7);

  // Ambient — warm during day, cool blue at night
  const ambDay = new THREE.Color(0.35, 0.35, 0.3);
  const ambNight = new THREE.Color(0.06, 0.07, 0.15);
  ambientLight.color.copy(ambDay).lerp(ambNight, 1 - dayFactor);
  ambientLight.intensity = 0.25 + dayFactor * 0.45;

  // Sunset coloring — golden hour push
  const sunsetFactor = Math.max(0, 1 - Math.abs(sunDir.y) * 5) * 0.6;
  sunLight.color.lerp(new THREE.Color(1.0, 0.45, 0.15), sunsetFactor);
  ambientLight.color.lerp(new THREE.Color(0.4, 0.25, 0.15), sunsetFactor * 0.4);

  // Sky
  skyDome.material.uniforms.uSunPos.value.copy(sunDir);
  skyDome.material.uniforms.uTime.value = realTime;
  skyDome.material.uniforms.uRain.value += ((rainActive ? 1 : 0) - skyDome.material.uniforms.uRain.value) * dt * 2;

  // Fog color
  const fogR = 0.55 * dayFactor + 0.05;
  const fogG = 0.7 * dayFactor + 0.05;
  const fogB = 0.85 * dayFactor + 0.1;
  scene.fog.color.setRGB(
    fogR * (1 - skyDome.material.uniforms.uRain.value * 0.3),
    fogG * (1 - skyDome.material.uniforms.uRain.value * 0.3),
    fogB * (1 - skyDome.material.uniforms.uRain.value * 0.2)
  );
  renderer.setClearColor(scene.fog.color);

  // Exposure — brighter day, moody night, dimmer rain
  const rainDamp = skyDome.material.uniforms.uRain.value;
  renderer.toneMappingExposure = (0.25 + dayFactor * 0.95) * (1 - rainDamp * 0.25);

  // Wind
  windDirection += (Math.random() - 0.5) * 0.01;
  windStrength += ((rainActive ? 0.8 : 0.2 + Math.sin(realTime * 0.1) * 0.15) - windStrength) * dt;

  // Grow grass
  let grownCount = 0;
  let totalHeight = 0;
  const growMult = (rainActive ? 3 : 1) * (dayFactor * 0.7 + 0.3) * timeSpeed;
  let matrixChanged = false;

  for (let i = 0; i < GRASS_COUNT; i++) {
    const b = grassBlades[i];
    if (b.scale < b.maxScale) {
      b.scale = Math.min(b.maxScale, b.scale + b.growSpeed * growMult * dt);
      if (i % 4 === Math.floor(realTime) % 4) { // stagger matrix updates
        dummy.position.set(b.x, b.y, b.z);
        dummy.rotation.set(0, b.rot, 0);
        dummy.scale.set(1, b.scale, 1);
        dummy.updateMatrix();
        grassMesh.setMatrixAt(i, dummy.matrix);
        matrixChanged = true;
      }
    }
    if (b.scale >= b.maxScale && !b.grown) {
      b.grown = true;
    }
    if (b.grown) grownCount++;
    totalHeight += b.scale;
  }
  if (matrixChanged) grassMesh.instanceMatrix.needsUpdate = true;

  // Grass shader uniforms
  grassMesh.material.uniforms.uTime.value = realTime;
  grassMesh.material.uniforms.uWindStr.value = windStrength;
  grassMesh.material.uniforms.uWindDir.value.set(Math.cos(windDirection), Math.sin(windDirection));
  grassMesh.material.uniforms.uSunDir.value.copy(sunDir);
  grassMesh.material.uniforms.uDayFactor.value = dayFactor;

  // Terrain uniforms
  terrainMesh.material.uniforms.uSunDir.value.copy(sunDir);
  terrainMesh.material.uniforms.uMoonDir.value.copy(moonDir);
  terrainMesh.material.uniforms.uDayFactor.value = dayFactor;

  // Score
  totalGrassScore = Math.floor(grownCount * 0.5 + (totalHeight / GRASS_COUNT) * 100);

  // Procedural clouds
  const rainVal = skyDome.material.uniforms.uRain.value;
  cloudPlanes.forEach(c => {
    c.position.x += c.userData.speed * dt * (1 + windStrength);
    if (c.position.x > 500) c.position.x = -500;
    c.position.y = c.userData.baseY + Math.sin(realTime * 0.2 + c.position.z * 0.008) * 3;
    c.material.uniforms.uTime.value = realTime;
    c.material.uniforms.uRain.value = rainVal;
    c.material.uniforms.uDayFactor.value = dayFactor;
  });

  // Rain
  if (rainSystem) {
    const rOp = rainSystem.material.opacity;
    const target = rainActive ? 0.5 : 0;
    rainSystem.material.opacity += (target - rOp) * dt * 3;
    if (rainSystem.material.opacity > 0.01) {
      const pos = rainSystem.geometry.attributes.position;
      const vel = rainSystem.userData.velocities;
      for (let i = 0; i < pos.count; i++) {
        let py = pos.getY(i) - vel[i] * dt;
        if (py < -5) py = 80 + Math.random() * 20;
        pos.setY(i, py);
        pos.setX(i, pos.getX(i) + windStrength * dt * 5);
      }
      pos.needsUpdate = true;
    }
    rainSystem.position.copy(camTarget);
  }

  // Camera movement
  const moveSpeed = 20 * dt;
  const forward = new THREE.Vector3(-Math.sin(camAngleH), 0, -Math.cos(camAngleH));
  const right = new THREE.Vector3(forward.z, 0, -forward.x);
  if (keys['w'] || keys['arrowup']) camTarget.addScaledVector(forward, moveSpeed);
  if (keys['s'] || keys['arrowdown']) camTarget.addScaledVector(forward, -moveSpeed);
  if (keys['a'] || keys['arrowleft']) camTarget.addScaledVector(right, -moveSpeed);
  if (keys['d'] || keys['arrowright']) camTarget.addScaledVector(right, moveSpeed);

  // Clamp target to field
  camTarget.x = Math.max(-FIELD_SIZE, Math.min(FIELD_SIZE, camTarget.x));
  camTarget.z = Math.max(-FIELD_SIZE, Math.min(FIELD_SIZE, camTarget.z));
  camTarget.y = getTerrainHeight(camTarget.x, camTarget.z) + 2;

  // Position camera
  const cx = camTarget.x + Math.sin(camAngleH) * camDist * Math.cos(camAngleV);
  const cy = camTarget.y + camDist * Math.sin(camAngleV);
  const cz = camTarget.z + Math.cos(camAngleH) * camDist * Math.cos(camAngleV);
  camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.08);
  camera.lookAt(camTarget);

  // HUD
  const hours = Math.floor(gameTime * 24);
  const mins = Math.floor((gameTime * 24 - hours) * 60);
  const ampm = hours >= 12 ? 'PM' : 'AM';
  const h12 = hours % 12 || 12;
  document.getElementById('time-display').textContent = `${h12}:${mins.toString().padStart(2,'0')} ${ampm}`;
  document.getElementById('blade-count').textContent = grownCount.toLocaleString();
  document.getElementById('avg-height').textContent = (totalHeight / GRASS_COUNT * 2).toFixed(1) + ' cm';
  document.getElementById('grass-score').textContent = totalGrassScore.toLocaleString();
  document.getElementById('weather-display').textContent = rainActive ? '🌧️ Rain' : (dayFactor < 0.1 ? '🌙 Night' : '☀️ Clear');

  const windNames = ['Calm', 'Breeze', 'Windy', 'Gusty', 'INTENSE'];
  const wi = Math.min(4, Math.floor(windStrength * 5));
  document.getElementById('wind-display').textContent = windNames[wi];

  // Achievements
  checkAchievements(realTime, grownCount);
  showNextAchievement();

  composer.render();
}

// --- START ---
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('controls-hint').style.display = 'block';
  document.getElementById('weather-btn').style.display = 'block';
  document.getElementById('speed-ctrl').style.display = 'flex';
  init();
});
</script>
